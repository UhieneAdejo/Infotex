<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - InfoteX IT</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        nav {
            background-color: #0c1b33;
            padding: 15px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 40px;
        }

        h1 {
            color: #0c1b33;
        }

        .contact-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 1px solid #999;
            border-radius: 5px;
        }

        button {
            padding: 12px 20px;
            background-color: #0c1b33;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #12345a;
        }
    </style>
</head>
<body>

    <!-- NAVIGATION BAR -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h1>Contact Us</h1>
        <p>If you would like to work with us or have any questions, feel free to reach out.</p>

        <div class="contact-box">
            <h2>Get in Touch</h2>

            <p><strong>Phone:</strong> +234 814 618 7087</p>
            <p><strong>Email:</strong> infotex2026@gmail.com</p>

<form id="contactForm">
    <label>Your Name</label>
    <input type="text" name="name" required>

    <label>Your Email</label>
    <input type="email" name="email" required>

    <label>Message</label>
    <textarea name="message" required></textarea>

    <button type="submit">Send Message</button>
</form>

<p id="response"></p>

        </div>
    </div>
<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = {
        name: this.name.value,
        email: this.email.value,
        message: this.message.value
    };

    try {
        const response = await fetch("/send-message", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        document.getElementById("response").innerText = result.message;

        if(result.success){
            document.getElementById("contactForm").reset();
        }

    } catch (error) {
        document.getElementById("response").innerText = "Error sending message.";
        console.error(error);
    }
});
</script>
</body>
</html>
